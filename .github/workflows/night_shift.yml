name: Night Shift — Autonomous Strategy Optimization

on:
  schedule:
    # Run nightly at 00:00 AEST (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      symbols:
        description: 'Symbols to optimize (comma-separated)'
        default: 'BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT'
        required: false
      fetch_fresh_data:
        description: 'Fetch fresh data from Binance (blocked on GitHub runners — only works locally)'
        type: boolean
        default: false
      num_folds:
        description: 'Number of WFA folds'
        default: '9'
        required: false

permissions:
  contents: write

jobs:
  night-shift:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # Kill if >5 hrs (added BB grid + validation phases)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -q pandas numpy ccxt pyarrow redis

      - name: Cache OHLCV data
        uses: actions/cache@v4
        with:
          path: data/ohlcv
          key: ohlcv-${{ runner.os }}-v1-${{ github.event.inputs.symbols || 'BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT' }}
          restore-keys: |
            ohlcv-${{ runner.os }}-v1-

      - name: Run Night Shift
        env:
          SYMBOLS: ${{ github.event.inputs.symbols || 'BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT' }}
          FETCH_DATA: ${{ github.event.inputs.fetch_fresh_data || 'false' }}
          FOLDS: ${{ github.event.inputs.num_folds || '9' }}
        run: |
          ARGS="--skip-fetch"
          if [ "$FETCH_DATA" = "true" ]; then
            ARGS=""
          fi
          python3 scripts/night_shift.py --config scripts/night_config.json $ARGS \
            --symbols $(echo $SYMBOLS | tr ',' ' ') \
            --folds $FOLDS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: night-results-${{ github.run_id }}
          path: data/night_results/
          retention-days: 30

      - name: Commit results to repo
        if: success()
        run: |
          git config user.name "Night Shift Bot"
          git config user.email "night-shift[bot]@users.noreply.github.com"
          git add data/night_results/ || echo "No results to commit"
          git diff --cached --quiet || git commit -m "night shift: $(date -u +%Y-%m-%d) results"
          git push || echo "Push failed (non-fast-forward or no changes)"

      - name: Post summary
        if: always()
        run: |
          echo "## Night Shift Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          DATE=$(date -u +%Y-%m-%d)
          REPORT="data/night_results/${DATE}/report.md"
          if [ -f "$REPORT" ]; then
            echo "### Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -80 "$REPORT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated (check logs above)" >> $GITHUB_STEP_SUMMARY
          fi
